<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>已上架商品掃描測試 (scan-test)</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background: #f5f5f5; }
    .card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 800px; margin: 0 auto; }
    h1 { margin-top: 0; color: #ee4d2d; }
    button { background: #ee4d2d; color: white; border: none; padding: 10px 20px; border-radius: 4px; font-size: 16px; cursor: pointer; }
    button:hover { background: #d73211; }
    .log-entry { margin: 8px 0; padding: 6px 10px; border-radius: 4px; font-family: monospace; }
    .log-entry.ok { background: #e6f4ea; color: #137333; }
    .log-entry.fail { background: #fce8e6; color: #c5221f; }
    .log-entry.info { background: #e8f0fe; color: #1a73e8; }
    #itemTable { width: 100%; border-collapse: collapse; margin-top: 15px; }
    #itemTable th, #itemTable td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    #itemTable th { background-color: #f2f2f2; }
  </style>
</head>
  <div class="card">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; border-bottom: 1px solid #eee; padding-bottom: 12px;">
      <a href="batch-upload.html" style="display: inline-flex; align-items: center; gap: 8px; text-decoration: none; font-weight: bold; font-size: 16px; color: #ee4d2d;">
        <span style="font-size: 22px;">📦</span>
        <span>蝦皮複製工具 ‹ 返回批次上傳</span>
      </a>
    </div>
    <h1>已上架商品掃描測試工具</h1>
    <p>測試 `extractSellerProductList` 是否能精確掃描 `seller.shopee.tw/portal/product/list` 頁面上所有商品。</p>
    <button id="btnRunScan">開始掃描測試</button>
    <div id="logContainer" style="margin-top: 20px;"></div>
    <table id="itemTable" style="display: none;">
      <thead>
        <tr>
          <th>#</th>
          <th>商品名稱</th>
          <th>商品 ID</th>
          <th>價格</th>
        </tr>
      </thead>
      <tbody id="itemTbody"></tbody>
    </table>
  </div>
  <script src="scan-test.js"></script>
</body>
</html>
