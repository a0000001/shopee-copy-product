<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 32px; background: #f8f9fa; color: #333; max-width: 500px;
    }
    h1 { font-size: 20px; margin-bottom: 20px; }
    h2 { font-size: 15px; margin-bottom: 12px; color: #444; }
    .section { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid #e0e0e0; }
    .section:last-child { border-bottom: none; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 4px; }
    input[type="text"] {
      width: 100%; padding: 8px 10px; font-size: 14px;
      border: 1px solid #ccc; border-radius: 6px;
    }
    .hint { font-size: 12px; color: #888; margin-top: 4px; }
    button {
      padding: 8px 24px; border: none; border-radius: 6px; font-size: 14px;
      cursor: pointer; font-weight: 500;
    }
    .btn-primary { background: #ee4d2d; color: #fff; }
    .btn-primary:hover { opacity: .85; }
    .btn-success { background: #26aa99; color: #fff; }
    .btn-success:hover { opacity: .85; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-danger:hover { opacity: .85; }
    .server-status { font-size: 13px; padding: 8px 12px; border-radius: 6px; margin: 8px 0; }
    .server-status.running { background: #e8f8f5; color: #26aa99; border: 1px solid #b2dfdb; }
    .server-status.stopped { background: #f5f5f5; color: #888; border: 1px solid #e0e0e0; }
    .server-status.error { background: #fdedec; color: #c0392b; border: 1px solid #f5b7b1; }
    .btn-row { display: flex; gap: 8px; margin-top: 8px; }
    #status { margin-top: 12px; font-size: 13px; }
    code { background: #eee; padding: 2px 6px; border-radius: 3px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>目錄伺服器設定</h1>

  <div class="section">
    <h2>伺服器狀態</h2>
    <div id="serverStatus" class="server-status stopped">檢查中...</div>
    <div class="btn-row">
      <button id="btnServerStart" class="btn-success">▶ 啟動伺服器</button>
      <button id="btnServerStop" class="btn-danger" style="display:none">⏹ 停止伺服器</button>
      <button id="btnServerRefresh" class="btn-primary">重新整理狀態</button>
    </div>
  </div>

  <div class="section">
    <h2>連線設定</h2>
    <div class="field">
      <label for="serverUrl">伺服器位址</label>
      <input type="text" id="serverUrl" value="http://localhost:9801">
      <div class="hint">本機目錄伺服器的完整 URL，包含 port。修改後需重新整理商品頁才會生效。</div>
    </div>
    <button id="btnSave" class="btn-primary">儲存</button>
    <div id="status"></div>
  </div>

  <div class="section">
    <h2>Native Host 安裝說明</h2>
    <div class="hint" style="line-height:1.6">
      若「啟動伺服器」按鈕無反應，表示尚未安裝 Native Messaging Host：<br><br>
      1. 到 <code>chrome://extensions</code> 啟用「開發者模式」<br>
      2. 記下此 extension 的 ID（32 個小寫字母）<br>
      3. 以 PowerShell 執行：<br>
      <code style="display:block;margin:6px 0;padding:8px;background:#333;color:#eee;font-size:12px">
        .\scripts\install-native-host.ps1 -ExtensionId 你的ID
      </code>
      4. 重新載入 extension
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
