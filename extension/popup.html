<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 420px; max-height: 520px; overflow-y: auto;
      padding: 16px; background: #f8f9fa; color: #333;
    }
    .section { margin-bottom: 12px; }
    .label { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; margin-bottom: 4px; }
    .value {
      font-size: 13px; background: #fff; border: 1px solid #e0e0e0; border-radius: 6px;
      padding: 8px 10px; word-break: break-all; line-height: 1.4;
    }
    .value.desc { max-height: 120px; overflow-y: auto; white-space: pre-wrap; }
    .count { font-size: 12px; color: #888; margin-left: 4px; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0 8px; }
    button {
      padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px;
      cursor: pointer; font-weight: 500; transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: #ee4d2d; color: #fff; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn-success { background: #26aa99; color: #fff; }
    .toast {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 6px 14px; border-radius: 20px;
      font-size: 12px; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .error { background: #fff3f3; border-color: #ffcccc; color: #c00; }
    .status { font-size: 13px; color: #666; padding: 20px 0; text-align: center; }
    .thumb-grid { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .thumb-grid img { width: 48px; height: 48px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; }
    .thumb-video { width: 48px; height: 48px; border-radius: 4px; border: 1px solid #ddd; background: #222; color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 18px; cursor: default; }
    #sellerModeLabel { font-size: 12px; color: #26aa99; font-weight: 600; margin-bottom: 8px; }
    .server-status { font-weight: 500; font-size: 14px; }
    .server-status.running { color: #26aa99; }
    .server-status.stopped { color: #f39c12; }
    .server-status.unknown { color: #999; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .server-status.spin { display: inline-block; animation: spin .8s linear infinite; }
    .btn-server {
      padding: 4px 8px; border: none; border-radius: 4px; font-size: 13px;
      cursor: pointer; font-weight: 600; background: #e0e0e0; color: #333;
      transition: background .15s;
    }
    .btn-server:hover { background: #ccc; }
    .btn-server:disabled { opacity: .4; cursor: not-allowed; }
    .btn-server.running { background: #e74c3c; color: #fff; }
    .btn-server.running:hover { background: #c0392b; }
    .field-row { display: flex; gap: 12px; margin-bottom: 12px; }
    .field-item { flex: 1; }
    .title-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-start; }
    .title-area { flex: 1; min-width: 0; }
    .title-area .value { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .server-panel { display: flex; align-items: center; gap: 4px; flex-shrink: 0; padding: 6px 8px; background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 11px; }
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.4); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-box {
      background: #fff; border-radius: 10px; padding: 20px;
      max-width: 90%; max-height: 80%; width: 380px;
      box-shadow: 0 4px 20px rgba(0,0,0,.25);
      display: flex; flex-direction: column;
    }
    .modal-title { font-size: 14px; font-weight: 700; color: #c00; margin-bottom: 10px; }
    .modal-body {
      font-size: 12px; line-height: 1.5; color: #333;
      white-space: pre-wrap; word-break: break-all;
      overflow-y: auto; flex: 1; min-height: 60px;
      background: #f5f5f5; border-radius: 6px; padding: 10px;
    }
    .modal-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
    .copy-option {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 12px; cursor: pointer; user-select: none;
    }
    .copy-option input { margin: 0; cursor: pointer; accent-color: #ee4d2d; }
    .copy-option span { color: #888; }
    .copy-option.checked span { color: #ee4d2d; font-weight: 600; }
  </style>
</head>
<body>
  <div id="status" class="status">擷取中...</div>
<div id="sellerUI" style="display:none">
    <div id="sellerModeLabel">📝 賣家編輯頁 — 填入模式</div>
    <div class="section">
      <div class="label">從剪貼簿填入</div>
      <div class="hint" style="font-size:11px;color:#888;margin-bottom:6px;line-height:1.4">
        先在商品頁按「複製到剪貼簿」取得 JSON，<br>到賣家頁後按下方按鈕一次填入。
        <br>⚠️ 請先手動選好類別，欄位才會出現
        <br>自動：數量=999、最低購買=1、尺寸=10x10x4、信用卡分期=24期
        <br>暫不實作：品牌（需自訂下拉選單，請手動選取）
      </div>
    </div>
    <div class="btn-row">
      <button id="btnFill" class="btn-success">📋 從剪貼簿填入</button>
    </div>
    <div id="fillResult" class="value" style="display:none;margin-top:8px;font-size:12px"></div>
    <div class="btn-row" style="margin-top:12px;border-top:1px solid #e0e0e0;padding-top:12px">
      <button id="btnBatchUpload" class="btn-primary">📦 批次上傳</button>
      <button id="btnBatchTest" class="btn-secondary" style="font-size:11px">🔬 測試</button>
    </div>
  </div>
  <div id="result" style="display:none">
    <div class="title-row">
      <div class="title-area">
        <div class="label">商品標題</div>
        <div id="title" class="value"></div>
      </div>
      <div class="server-panel">
        <span id="serverIndicator" class="server-status unknown" title="檢查中…">◌</span>
        <button id="btnServerToggle" class="btn-server" title="啟動伺服器">▶</button>
      </div>
    </div>
    <div class="field-row">
      <div class="field-item">
        <div class="label">價格</div>
        <div id="price" class="value"></div>
      </div>
      <div class="field-item">
        <div class="label">庫存</div>
        <input id="ps_stock" type="number" value="999" min="0" class="value" style="width:90px">
      </div>
      <div class="field-item">
        <div class="label">尺寸</div>
        <div class="value" style="font-size:12px;color:#888;white-space:nowrap">10×10×4 cm</div>
      </div>
    </div>
    <div class="section">
      <div class="label">類別</div>
      <select id="ps_category" class="value" style="width:100%">
        <option value="">-- 請選擇類別 --</option>
        <option value="100644,101937" selected>電腦與周邊配件 &gt; 軟體</option>
      </select>
    </div>
    <div class="section">
      <div class="label">商品描述</div>
      <div id="description" class="value desc"></div>
    </div>
    <div class="section">
      <div class="label">媒體 <span id="mediaCount" class="count"></span></div>
      <div id="mediaGrid" class="thumb-grid"></div>
    </div>
    <div class="btn-row">
      <button id="btnDownload" class="btn-success">下載資料</button>
      <button id="btnCopy" class="btn-primary">複製到剪貼簿</button>
      <label class="copy-option" title="複製時同時送出至目錄">
        <input type="checkbox" id="chkAutoCatalog">
        <span>更新JSON</span>
      </label>
    </div>
  </div>
  <div id="error" class="value error" style="display:none"></div>
  <div id="toast" class="toast"></div>
  <div id="errorModal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-title">❌ 錯誤</div>
      <div id="errorModalBody" class="modal-body"></div>
      <div class="modal-actions">
        <button id="btnCopyError" class="btn-secondary">📋 複製錯誤訊息</button>
        <button id="btnCloseError" class="btn-primary">✕ 關閉</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
