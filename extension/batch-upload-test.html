<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>批次上傳測試</title>
<style>
  body { font-family: monospace; padding: 20px; }
  h1 { font-size: 18px; }
  button { padding: 8px 16px; font-size: 14px; cursor: pointer; }
  #output {
    margin-top: 12px; padding: 12px; background: #f5f5f5; border-radius: 6px;
    min-height: 100px; font-size: 12px; line-height: 1.5; white-space: pre-wrap;
    max-height: 400px; overflow-y: auto;
  }
  .ok { color: #26aa99; }
  .fail { color: #e74c3c; }
  .info { color: #666; }
  .btn-row { margin-top: 12px; display: flex; gap: 8px; }
</style>
</head>
<body>
  <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; border-bottom: 1px solid #eee; padding-bottom: 12px;">
    <a href="batch-upload.html" style="display: inline-flex; align-items: center; gap: 8px; text-decoration: none; font-weight: bold; font-size: 16px; color: #ee4d2d;">
      <span style="font-size: 22px;">📦</span>
      <span>蝦皮複製工具 ‹ 返回批次上傳</span>
    </a>
  </div>
  <h1>批次上傳單件測試</h1>
  <button id="btnTest">測試：開新分頁 → 送訊息</button>
  <div class="btn-row">
    <button id="btnCopyLog">📋 複製日誌</button>
  </div>
  <div id="output">按「測試」按鈕開始...</div>
  <script src="batch-upload-test.js"></script>
</body>
</html>
