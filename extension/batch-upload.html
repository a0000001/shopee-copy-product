<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>批次上傳至蝦皮</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px; max-width: 720px; margin: 0 auto; color: #333; background: #f8f9fa;
    }
    h1 { font-size: 20px; margin-bottom: 20px; }
    .step {
      margin-bottom: 20px; padding: 16px; background: #fff;
      border: 1px solid #e0e0e0; border-radius: 8px;
    }
    .step h3 { font-size: 14px; margin-bottom: 10px; color: #555; }
    .step-info { font-size: 13px; margin-top: 8px; }
    .step-info.ok { color: #26aa99; }
    .step-info.fail { color: #e74c3c; }
    .step-info.wait { color: #f39c12; }
    .progress-bar { height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin: 8px 0; }
    .progress-fill { height: 100%; background: #26aa99; transition: width .3s; }
    .log {
      background: #f5f5f5; border-radius: 6px; padding: 10px; font-size: 12px;
      max-height: 200px; overflow-y: auto; font-family: monospace; line-height: 1.6;
    }
    .log-entry { padding: 1px 0; }
    .log-entry.ok { color: #26aa99; }
    .log-entry.fail { color: #e74c3c; }
    .log-entry.info { color: #666; }
    button {
      padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px;
      cursor: pointer; font-weight: 500; transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: #ee4d2d; color: #fff; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .summary-card { padding: 20px; border-radius: 8px; text-align: center; }
    .summary-card.ok { background: #e8f8f5; }
    .summary-card.fail { background: #fdecea; }
    .summary-card .num { font-size: 36px; font-weight: 700; }
    .summary-card .label { font-size: 13px; color: #666; margin-top: 4px; }
    #currentItem { font-size: 14px; margin: 8px 0; color: #333; }
  </style>
</head>
<body>
  <h1>📦 批次上傳至蝦皮</h1>

  <div id="step1" class="step">
    <h3>步驟 1：掃描已上架商品</h3>
    <button id="btnScan" class="btn-primary">掃描已上架商品</button>
    <button id="btnTestScan" class="btn-secondary" style="margin-left: 10px; background: #6c757d; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer;">🧪 測試已上架商品掃描 (scan-test.html)</button>
    <div id="scanInfo" class="step-info" style="display:none"></div>
  </div>

  <div id="step2" class="step" style="display:none">
    <h3>步驟 2：選擇商品目錄 JSON 檔案</h3>
    <input type="file" id="fileInput" accept=".json">
    <div id="fileInfo" class="step-info" style="display:none"></div>
  </div>

  <div id="step3" class="step" style="display:none">
    <h3>步驟 3：開始上傳</h3>
    <div style="margin-bottom:4px;">
      <span id="progressText">0 / 0 筆</span>
    </div>
    <div class="progress-bar">
      <div id="progressFill" class="progress-fill" style="width:0%"></div>
    </div>
    <div id="currentItem"></div>
    <div id="logContainer" class="log"></div>
    <div class="btn-row">
      <button id="btnStart" class="btn-primary">開始上傳</button>
      <button id="btnStop" class="btn-secondary" style="display:none">中斷</button>
    </div>
  </div>

  <div id="step4" class="step" style="display:none">
    <h3>步驟 4：完成</h3>
    <div class="summary-grid">
      <div class="summary-card ok">
        <div class="num" id="successCount">0</div>
        <div class="label">成功</div>
      </div>
      <div class="summary-card fail">
        <div class="num" id="failCount">0</div>
        <div class="label">失敗</div>
      </div>
    </div>
    <div class="btn-row">
      <button id="btnRetry" class="btn-primary">重試失敗項目</button>
      <button id="btnCopyErrors" class="btn-secondary">📋 複製錯誤訊息</button>
      <button id="btnClose" class="btn-secondary">關閉</button>
    </div>
    <pre id="errorDetail" style="display:none;margin-top:12px;padding:10px;background:#fdecea;border-radius:6px;font-size:12px;line-height:1.5;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;"></pre>
  </div>

  <script src="batch-upload.js"></script>
</body>
</html>
